<nav class="navbar">
        <a href="/" class="back-link">← Back to Home</a>
    </nav>
<h1>Add Student</h1>
<form method="POST">
{% csrf_token %}
{{ form.as_p }}
<button type="submit">
Save
</button>
</form>
<style>
    /* =========================================
   FORM STYLING
   ========================================= */

/* The main form container */
form {
    background-color: #ffffff;
    width: 90%;
    max-width: 500px;
    margin: 40px auto; /* Centers the form with space above and below */
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); /* Matches your global shadows */
}

/* Targeting the paragraph tags generated by Django's {{ form.as_p }} */
form p {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column; /* Stacks the label directly above the input field */
}

/* Form Labels */
form label {
    font-weight: 600;
    margin-bottom: 8px;
    color: #2c3e50; /* Dark slate blue */
    font-size: 0.95rem;
}

/* Form Inputs (Targeting text, numbers, and dropdowns) */
form input[type="text"],
form input[type="number"],
form select,
form textarea {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #dcdde1; /* Light gray border */
    border-radius: 6px;
    font-size: 1rem;
    color: #333333;
    font-family: inherit; /* Ensures it uses your global Segoe UI font */
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

/* Input Focus State (When a user clicks inside the field) */
form input[type="text"]:focus,
form input[type="number"]:focus,
form select:focus,
form textarea:focus {
    border-color: #3498db; /* Bright blue highlight */
    outline: none; /* Removes the default browser outline */
    box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); /* Soft blue glow */
}

/* Submit Button */
form button[type="submit"] {
    width: 100%;
    background-color: #3498db; /* Bright blue matching your nav links */
    color: #ffffff;
    border: none;
    padding: 14px 20px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    margin-top: 10px;
}

/* Submit Button Hover State */
form button[type="submit"]:hover {
    background-color: #2980b9; /* Slightly darker blue on hover */
}

/* Optional: Style the help text Django sometimes generates */
form .helptext {
    font-size: 0.8rem;
    color: #7f8c8d;
    margin-top: 5px;
}
</style>

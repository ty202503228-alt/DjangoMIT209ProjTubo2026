<nav class="navbar">
        <a href="/" class="back-link">← Back to Home</a>
    </nav>
<h1>Student List</h1>

<div class="student-list-container">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Year</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td><strong>{{ student.name }}</strong></td>
                <td>{{ student.course }}</td>
                <td>{{ student.year }}</td>
                <td>
                    <a href="{% url 'edit_student' student.id %}">Edit</a> 
                    <a href="{% url 'delete_student' student.id %}">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<style>
   /* =========================================
   TABLE CONTAINER & ACTION LINKS
   ========================================= */

/* Adjust the container to center the table neatly */
.student-list-container {
    width: 90%;
    max-width: 800px;
    margin: 20px auto;
    overflow-x: auto; /* Ensures the table is scrollable on very small screens */
}

/* Base styles for the action links */
.student-list-container td a {
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 6px 12px;
    border-radius: 4px;
    transition: all 0.3s ease;
    display: inline-block; /* Allows padding and margins to work correctly */
}

/* Remove the default color of the pipe (|) text if you keep it */
.student-list-container td {
    color: #7f8c8d; 
}

/* Edit Link - Blue */
.student-list-container td a[href*="edit"] {
    color: #3498db;
    background-color: rgba(52, 152, 219, 0.1); /* Very light blue background */
    border: 1px solid transparent;
}

.student-list-container td a[href*="edit"]:hover {
    background-color: #3498db;
    color: #ffffff;
}

/* Delete Link - Red */
.student-list-container td a[href*="delete"] {
    color: #e74c3c;
    background-color: rgba(231, 76, 60, 0.1); /* Very light red background */
    border: 1px solid transparent;
}

.student-list-container td a[href*="delete"]:hover {
    background-color: #e74c3c;
    color: #ffffff;
}
</style>

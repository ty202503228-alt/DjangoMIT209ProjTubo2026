<nav class="navbar">
        <a href="/" class="back-link">← Back to Home</a>
</nav>
<h1>Edit Student</h1>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-update">
        Update
    </button>
</form>
<style>
/* =========================================
   FORM CONTAINER & INPUT STYLING
   ========================================= */

form {
    background-color: #ffffff;
    width: 90%;
    max-width: 500px;
    margin: 40px auto; 
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); 
}

form p {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column; 
}

form label {
    font-weight: 600;
    margin-bottom: 8px;
    color: #2c3e50; 
    font-size: 0.95rem;
}

form input[type="text"],
form input[type="number"],
form select,
form textarea {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #dcdde1; 
    border-radius: 6px;
    font-size: 1rem;
    color: #333333;
    font-family: inherit; 
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

form input:focus,
form select:focus,
form textarea:focus {
    border-color: #2ecc71; /* Matched the green for the edit focus state */
    outline: none; 
    box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2); 
}

/* =========================================
   EDIT FORM SPECIFIC STYLING (BUTTON)
   ========================================= */

/* Base styles for the button */
form button.btn-update {
    width: 100%;
    color: #ffffff;
    border: none;
    padding: 14px 20px;
    font-size: 1.1rem;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    margin-top: 10px;
    background-color: #2ecc71; /* Emerald green */
}

/* Update Button Hover State */
form button.btn-update:hover {
    background-color: #27ae60; /* Slightly darker green on hover */
}

form .helptext {
    font-size: 0.8rem;
    color: #7f8c8d;
    margin-top: 5px;
}
</style>
